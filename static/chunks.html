<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>切分策略对比</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f5f5; color: #333; padding: 20px; }
h1 { text-align: center; margin-bottom: 20px; font-size: 1.5em; }
.upload-area {
  max-width: 600px; margin: 0 auto 30px; padding: 40px; text-align: center;
  border: 2px dashed #ccc; border-radius: 12px; background: #fff; cursor: pointer;
  transition: border-color 0.2s;
}
.upload-area:hover { border-color: #4a90d9; }
.upload-area input { display: none; }
.upload-area p { color: #888; margin-top: 8px; font-size: 0.9em; }
.btn {
  display: inline-block; padding: 10px 24px; background: #4a90d9; color: #fff;
  border: none; border-radius: 6px; font-size: 1em; cursor: pointer;
}
.btn:disabled { background: #aaa; cursor: not-allowed; }
.loading { text-align: center; padding: 40px; color: #888; }
.results { max-width: 1200px; margin: 0 auto; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 16px; }
.card {
  background: #fff; border-radius: 10px; padding: 16px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.08); border-left: 4px solid #4a90d9;
}
.card h3 { font-size: 1em; margin-bottom: 10px; color: #4a90d9; }
.card .meta { font-size: 0.85em; color: #666; margin-bottom: 12px; line-height: 1.6; }
.card .meta span { display: inline-block; background: #f0f4f8; padding: 2px 8px; border-radius: 4px; margin-right: 6px; }
.chunks-list { max-height: 400px; overflow-y: auto; }
.chunk-item {
  background: #fafafa; border: 1px solid #eee; border-radius: 6px;
  padding: 10px; margin-bottom: 8px; font-size: 0.85em; line-height: 1.6;
  white-space: pre-wrap; word-break: break-all;
}
.chunk-item .chunk-header {
  font-weight: 600; color: #999; font-size: 0.8em; margin-bottom: 4px;
}
.error { color: #e74c3c; font-style: italic; }
.colors-0 { border-left-color: #4a90d9; }
.colors-0 h3 { color: #4a90d9; }
.colors-1 { border-left-color: #27ae60; }
.colors-1 h3 { color: #27ae60; }
.colors-2 { border-left-color: #e67e22; }
.colors-2 h3 { color: #e67e22; }
.colors-3 { border-left-color: #8e44ad; }
.colors-3 h3 { color: #8e44ad; }
.colors-4 { border-left-color: #e74c3c; }
.colors-4 h3 { color: #e74c3c; }
.colors-5 { border-left-color: #16a085; }
.colors-5 h3 { color: #16a085; }
.colors-6 { border-left-color: #f39c12; }
.colors-6 h3 { color: #f39c12; }
</style>
</head>
<body>
<h1>📄 切分策略对比工具</h1>

<div class="upload-area" id="dropZone">
  <button class="btn" onclick="document.getElementById('fileInput').click()">选择文件</button>
  <input type="file" id="fileInput" accept=".txt,.md">
  <p>支持 .txt / .md 文件，点击或拖拽上传</p>
  <p id="fileName" style="color:#333;font-weight:600;margin-top:8px;"></p>
</div>

<div id="loading" class="loading" style="display:none;">⏳ 正在切分中，semantic 策略需要调用 embedding 接口，请稍候...</div>
<div id="results" class="results"></div>

<script>
const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
const loading = document.getElementById('loading');
const results = document.getElementById('results');
const fileName = document.getElementById('fileName');

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.style.borderColor = '#4a90d9'; });
dropZone.addEventListener('dragleave', () => { dropZone.style.borderColor = '#ccc'; });
dropZone.addEventListener('drop', e => {
  e.preventDefault(); dropZone.style.borderColor = '#ccc';
  if (e.dataTransfer.files.length) { handleFile(e.dataTransfer.files[0]); }
});
fileInput.addEventListener('change', () => { if (fileInput.files.length) handleFile(fileInput.files[0]); });

async function handleFile(file) {
  fileName.textContent = '📎 ' + file.name;
  loading.style.display = 'block';
  results.innerHTML = '';

  const form = new FormData();
  form.append('file', file);

  try {
    const resp = await fetch('/compare-chunks-detail', { method: 'POST', body: form });
    const data = await resp.json();
    loading.style.display = 'none';
    renderResults(data);
  } catch (err) {
    loading.style.display = 'none';
    results.innerHTML = '<p class="error">请求失败: ' + err.message + '</p>';
  }
}

function renderResults(data) {
  const keys = Object.keys(data);
  let html = '<div class="grid">';
  keys.forEach((key, i) => {
    const item = data[key];
    const colorClass = 'colors-' + (i % 7);
    html += '<div class="card ' + colorClass + '">';
    html += '<h3>' + key.toUpperCase() + '</h3>';

    if (item.error) {
      html += '<p class="error">❌ ' + item.error + '</p>';
    } else {
      html += '<div class="meta">';
      html += '<span>策略: ' + item.strategy + '</span>';
      html += '<span>chunk_size: ' + item.chunk_size + '</span>';
      html += '<span>块数: ' + item.num_chunks + '</span>';
      html += '<span>平均长度: ' + item.avg_length + '</span>';
      html += '</div>';
      html += '<div class="chunks-list">';
      (item.chunks || []).forEach((chunk, ci) => {
        html += '<div class="chunk-item">';
        html += '<div class="chunk-header">Chunk #' + (ci + 1) + ' (' + chunk.length + ' 字符)</div>';
        html += escapeHtml(chunk);
        html += '</div>';
      });
      html += '</div>';
    }
    html += '</div>';
  });
  html += '</div>';
  results.innerHTML = html;
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}
</script>
</body>
</html>
